<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Secret Training Programme</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #7A5E28;
    --dark: #0D0B08;
    --dark2: #161410;
    --dark3: #1F1C17;
    --dark4: #2A2620;
    --parchment: #F5EDD6;
    --parchment2: #EAD9B0;
    --text: #EDE0C4;
    --text-dim: #9A8A6A;
    --correct: #3A6B3A;
    --correct-light: #4E9A4E;
    --wrong: #7A2020;
    --wrong-light: #A83030;
    --radius: 4px;
    --radius-lg: 8px;
  }

  body {
    background-color: var(--dark);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,168,76,0.025) 40px, rgba(201,168,76,0.025) 41px),
      repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(201,168,76,0.025) 40px, rgba(201,168,76,0.025) 41px);
    pointer-events: none;
    z-index: 0;
  }

  /* Central compass rose watermark */
  body::after {
    content: '✦';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 600px;
    color: rgba(201,168,76,0.025);
    pointer-events: none;
    z-index: 0;
    line-height: 1;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.8s ease both;
  }

  .header-emblem {
    font-size: 2.8rem;
    margin-bottom: 0.5rem;
    opacity: 0.85;
    display: block;
  }

  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.3rem, 4vw, 1.9rem);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1.3;
    margin-bottom: 0.4rem;
  }

  .header p {
    font-size: 1rem;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.04em;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.5rem 0;
    opacity: 0.5;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  .divider span { color: var(--gold); font-size: 0.8rem; letter-spacing: 0.2em; }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 0.82rem;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.08em;
  }

  .progress-track {
    height: 3px;
    background: var(--dark4);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold-dim), var(--gold));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* Card */
  .card {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius-lg);
    padding: 2rem;
    position: relative;
    animation: fadeUp 0.5s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius-lg);
    box-shadow: inset 0 1px 0 rgba(201,168,76,0.1);
    pointer-events: none;
  }

  .q-number {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .q-text {
    font-size: 1.2rem;
    font-weight: 300;
    color: var(--parchment);
    line-height: 1.6;
    margin-bottom: 1.75rem;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 16px;
    background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 1rem;
    font-weight: 300;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    text-align: left;
    width: 100%;
  }

  .opt-btn:hover:not(:disabled) {
    background: var(--dark4);
    border-color: rgba(201,168,76,0.4);
    transform: translateX(3px);
  }

  .opt-letter {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--gold-dim);
    min-width: 18px;
    letter-spacing: 0.1em;
  }

  .opt-btn.correct {
    background: rgba(58,107,58,0.25);
    border-color: var(--correct-light);
    color: #8FCA8F;
  }
  .opt-btn.correct .opt-letter { color: var(--correct-light); }

  .opt-btn.wrong {
    background: rgba(122,32,32,0.25);
    border-color: var(--wrong-light);
    color: #D08080;
  }
  .opt-btn.wrong .opt-letter { color: var(--wrong-light); }

  .opt-btn:disabled { cursor: default; transform: none; }

  /* Feedback */
  .feedback {
    margin-top: 1.25rem;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-style: italic;
    line-height: 1.55;
    animation: fadeUp 0.3s ease both;
    border-left: 3px solid;
  }
  .feedback.ok { background: rgba(58,107,58,0.15); border-color: var(--correct-light); color: #A0D0A0; }
  .feedback.ko { background: rgba(122,32,32,0.15); border-color: var(--wrong-light); color: #D09090; }

  /* Next button */
  .btn-next {
    margin-top: 1.5rem;
    padding: 12px 28px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.82rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    display: block;
  }
  .btn-next:hover { background: var(--gold); color: var(--dark); }

  /* Score screen */
  .score-screen {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .score-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }

  .score-label {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .score-number {
    font-family: 'Cinzel', serif;
    font-size: 4rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .score-total {
    font-size: 1.1rem;
    color: var(--text-dim);
    margin-bottom: 1.5rem;
    font-style: italic;
  }

  .score-message {
    font-size: 1.1rem;
    color: var(--parchment2);
    line-height: 1.7;
    margin-bottom: 2rem;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Diploma unlock */
  .diploma-box {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 10px rgba(201,168,76,0.1); }
    50% { box-shadow: 0 0 22px rgba(201,168,76,0.25); }
  }

  .diploma-title {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .diploma-desc {
    font-size: 0.95rem;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 1.2rem;
    line-height: 1.5;
  }

  .btn-diploma {
    display: inline-block;
    padding: 13px 32px;
    background: var(--gold);
    color: var(--dark);
    border: none;
    border-radius: var(--radius);
    font-family: 'Cinzel', serif;
    font-size: 0.82rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-diploma:hover { background: var(--gold-light); transform: translateY(-1px); }

  .failed-box {
    background: rgba(122,32,32,0.1);
    border: 1px solid rgba(122,32,32,0.3);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
    color: #C09090;
    font-style: italic;
    line-height: 1.6;
  }

  .btn-retry {
    padding: 12px 28px;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-retry:hover { border-color: var(--gold); color: var(--gold); }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    font-style: italic;
    opacity: 0.6;
    letter-spacing: 0.06em;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card { padding: 1.5rem 1.25rem; }
    .score-number { font-size: 3rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="header-emblem">⧖</span>
    <h1>The Secret Training Programme</h1>
    <p>Test your knowledge</p>
  </div>

  <div id="quiz"></div>

  <div class="footer">Ancient &amp; Accepted Scottish Rite &mdash; Knowledge is Light</div>
</div>

<script>
const PASS_SCORE = 5;

// ⚠️ REPLACE THIS URL WITH YOUR GOOGLE FORMS LINK
const GOOGLE_FORM_URL = "https://forms.gle/7xuwd4nZ4PTmtZCH7";

const questions = [
  {
    q: "What is the first degree of Freemasonry in the Ancient and Accepted Scottish Rite?",
    options: ["Entered Apprentice", "Fellow Craft", "Master Mason"],
    answer: 0,
    expl: "The 1st degree is that of Entered Apprentice, the first initiatic step on the Masonic path."
  },
  {
    q: "How many degrees does the Ancient and Accepted Scottish Rite (A.A.S.R.) contain in total?",
    options: ["18 degrees", "33 degrees", "7 degrees"],
    answer: 1,
    expl: "The A.A.S.R. comprises 33 degrees, from the humble Entered Apprentice to the Sovereign Grand Inspector General."
  },
  {
    q: "Which degree bears the title of 'Secret Master'?",
    options: ["4th degree", "18th degree", "32nd degree"],
    answer: 0,
    expl: "The 4th degree is that of Secret Master, the first degree of the Lodges of Perfection."
  },
  {
    q: "Which degree is known as the 'Knight Rose Croix'?",
    options: ["14th degree", "18th degree", "25th degree"],
    answer: 1,
    expl: "The 18th degree — Knight Rose Croix — is one of the most significant and spiritually rich degrees of the A.A.S.R."
  },
  {
    q: "What is the 33rd and highest degree of the Scottish Rite?",
    options: ["Grand Commander", "Sovereign Grand Inspector General", "Prince of the Royal Secret"],
    answer: 1,
    expl: "The 33rd degree belongs to the Sovereign Grand Inspectors General, the supreme guardians of the Rite."
  },
  {
    q: "Which degree confers the title 'Sublime Prince of the Royal Secret'?",
    options: ["20th degree", "32nd degree", "27th degree"],
    answer: 1,
    expl: "The 32nd degree — Sublime Prince of the Royal Secret — is the penultimate degree before the honorary 33rd."
  },
  {
    q: "What symbolic tool does the Entered Apprentice receive during his initiation?",
    options: ["The compass", "The square", "The gavel"],
    answer: 1,
    expl: "The square is the principal tool of the Entered Apprentice, symbolising moral rectitude and upright conduct."
  },
  {
    q: "The degree of 'Grand Elect, Perfect and Sublime Mason' corresponds to which number?",
    options: ["9th degree", "14th degree", "21st degree"],
    answer: 1,
    expl: "The 14th degree — Grand Elect, Perfect and Sublime Mason — closes the cycle of the Lodges of Perfection."
  },
  {
    q: "Which biblical figure lies at the heart of the founding myth of the 3rd degree (Master Mason)?",
    options: ["Solomon", "Moses", "Hiram Abiff"],
    answer: 2,
    expl: "Hiram Abiff, the legendary architect of Solomon's Temple, is the central figure of the Master Mason degree."
  },
  {
    q: "From which degree may a Mason preside over a symbolic lodge?",
    options: ["1st degree (Entered Apprentice)", "3rd degree (Master Mason)", "7th degree"],
    answer: 1,
    expl: "A Master Mason (3rd degree) is eligible to preside over a Blue Lodge or Symbolic Lodge."
  }
];

let current = 0, score = 0, answered = false;

function render() {
  const app = document.getElementById('quiz');

  if (current >= questions.length) {
    renderScore(app);
    return;
  }

  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  const labels = ['A', 'B', 'C'];

  app.innerHTML = `
    <div class="progress-row">
      <span>Question ${current + 1} of ${questions.length}</span>
      <span>${score} correct</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="card">
      <div class="q-number">Question ${current + 1} &mdash; 33 Degrees</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="opt-btn" id="opt${i}" onclick="choose(${i})">
            <span class="opt-letter">${labels[i]}</span>
            <span>${o}</span>
          </button>`).join('')}
      </div>
      <div id="feedback"></div>
      <div id="next-wrap"></div>
    </div>`;
}

function choose(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const fb = document.getElementById('feedback');

  q.options.forEach((_, i) => {
    const btn = document.getElementById('opt' + i);
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });

  if (idx === q.answer) {
    score++;
    fb.innerHTML = `<div class="feedback ok">✓ &nbsp;${q.expl}</div>`;
  } else {
    fb.innerHTML = `<div class="feedback ko">✗ &nbsp;${q.expl}</div>`;
  }

  const isLast = current >= questions.length - 1;
  document.getElementById('next-wrap').innerHTML =
    `<button class="btn-next" onclick="next()">${isLast ? 'See my result →' : 'Next question →'}</button>`;
}

function next() { answered = false; current++; render(); }

function renderScore(app) {
  const passed = score >= PASS_SCORE;
  const icon = score >= 8 ? '⧖' : score >= 5 ? '◈' : '△';
  const message = score >= 8
    ? "Outstanding, Venerable Brother. Your knowledge of the Rite honours the Craft."
    : score >= 5
    ? "Well done, Brother. You have earned the right to receive your diploma."
    : "Your initiation is not yet complete. Study the degrees further and try again.";

  const diplomaBlock = passed ? `
    <div class="diploma-box">
      <div class="diploma-title">⊕ &nbsp; Diploma Unlocked</div>
      <div class="diploma-desc">Congratulations — you have passed the knowledge test. Fill in the form below to receive your official diploma.</div>
      <a class="btn-diploma" href="${GOOGLE_FORM_URL}" target="_blank" rel="noopener">Apply for my Diploma →</a>
    </div>` : `
    <div class="failed-box">
      You need at least <strong>${PASS_SCORE}/10</strong> to unlock the diploma. You scored <strong>${score}/10</strong>. Return to the lodge and deepen your study of the 33 degrees.
    </div>`;

  app.innerHTML = `
    <div class="score-screen">
      <span class="score-icon">${icon}</span>
      <div class="score-label">Your result</div>
      <div class="score-number">${score}</div>
      <div class="score-total">out of 10 questions</div>
      <div class="score-message">${message}</div>
      ${diplomaBlock}
      <button class="btn-retry" onclick="restart()">Try again</button>
    </div>`;
}

function restart() { current = 0; score = 0; answered = false; render(); }

render();
</script>
</body>
</html>
